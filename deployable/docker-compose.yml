version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: deployable_postgres
    environment:
      POSTGRES_USER: deployable_user
      POSTGRES_PASSWORD: deployable_pass
      POSTGRES_DB: deployable_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployable_user -d deployable_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
    container_name: deployable_api
    environment:
      DATABASE_URL: postgresql://deployable_user:deployable_pass@postgres:5432/deployable_db
      SECRET_KEY: supersecretkey
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
